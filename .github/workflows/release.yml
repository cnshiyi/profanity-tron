name: "Build And Release"

on:
  push:
    tags:
      - "v*"
      
jobs:
  build_for_windows:
    name: "Build for Windows"
    runs-on: [windows-2022]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: 2022
          
      - name: "Build Windows Package"
        shell: powershell
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          $signArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64)) {
            $pfxPath = Join-Path $env:RUNNER_TEMP "shiyi-signing.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_PFX_BASE64))
            $signArgs += @("-SignPfxPath", $pfxPath)
            if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_PASSWORD)) {
              $signArgs += @("-SignPfxPassword", $env:WINDOWS_SIGNING_PFX_PASSWORD)
            }
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-windows.ps1 -Version "${{ github.ref_name }}" @signArgs

      - name: "List Assets"
        shell: powershell
        run: Get-ChildItem -Recurse ${{ github.workspace }}/dist | Select-Object FullName,Length

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ github.workspace }}/dist/shiyi-${{ github.ref_name }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          bodyFile: "${{ github.workspace }}/RELEASE_NOTES.md"
          draft: false
          allowUpdates: true
          replacesArtifacts: true
